name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CI_GITLEAKS_ENABLED: ${{ vars.CI_GITLEAKS_ENABLED || '1' }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Docker Compose
        env:
          POSTGRES_PASSWORD: ci_compose_validate_only
          DATABASE_URL: postgresql://electricity_user:ci_compose_validate_only@db:5432/electricity_prices
        run: |
          docker compose config -q
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config -q

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend unit tests
        working-directory: backend
        run: |
          if [ -f src/test.js ]; then
            npm test
          else
            echo "Skipping backend unit tests: src/test.js not present yet"
          fi

      - name: Install frontend dependencies
        working-directory: electricity-prices-build
        run: npm ci

      - name: Frontend build
        working-directory: electricity-prices-build
        run: npm run build

      - name: Frontend smoke tests
        working-directory: electricity-prices-build
        run: npm test

      - name: SEO sitemap route tests
        run: node --test tests/seo/sitemap.routes.test.js

      - name: Golden runner (integration gate skip)
        run: node tests/golden/runner.test.js

      - name: Repo hygiene files
        run: |
          test -f AGENTS.md
          test -f .env.example
          test -f electricity-prices-build/.env.example
          test -f swagger-ui/openapi.yaml
          test -f deploy/local.env.example
          test -f bin/smoke-local.sh
          test -f database/fixtures/ci_seed.sql
          test -f tests/golden/scenarios.json

      - name: OpenAPI structure check
        run: |
          node -e "
            const fs = require('fs');
            const y = fs.readFileSync('swagger-ui/openapi.yaml', 'utf8');
            if (!y.includes('openapi: 3.')) throw new Error('missing openapi version');
            if (!y.includes('/health')) throw new Error('missing /health');
          "

      - name: OpenAPI JSON sync check
        run: node bin/openapi-json-from-yaml.js --check

      - name: OpenAPI route parity check
        run: node bin/validate-openapi-routes.js

      - name: OpenAPI Spectral lint (UA3 spectral:oas)
        run: npx --yes @stoplight/spectral-cli@6.15.0 lint swagger-ui/openapi.yaml

      - name: OpenAPI contract sample tests
        run: node --test tests/contract/openapi-samples.test.js

      - name: Warn if vendor/flows is behind origin/main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCAL=$(git ls-tree HEAD vendor/flows | awk '{print $3}')
          if [ -z "$LOCAL" ]; then
            echo "No vendor/flows gitlink; skipping freshness check"
            exit 0
          fi
          REMOTE=$(gh api repos/alicemq/flows/commits/main --jq .sha 2>/dev/null || true)
          if [ -z "$REMOTE" ]; then
            echo "Could not resolve alicemq/flows main; skipping freshness check"
            exit 0
          fi
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "::warning title=Stale flows submodule::vendor/flows gitlink ($LOCAL) is behind origin/main ($REMOTE). Run: git submodule update --remote vendor/flows"
          else
            echo "vendor/flows gitlink matches origin/main ($LOCAL)"
          fi

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend and frontend images
        env:
          POSTGRES_PASSWORD: ci_compose_validate_only
          DATABASE_URL: postgresql://electricity_user:ci_compose_validate_only@db:5432/electricity_prices
        run: docker compose build backend frontend

  secret-scan:
    runs-on: ubuntu-latest
    if: ${{ (vars.CI_GITLEAKS_ENABLED || '1') != '0' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
