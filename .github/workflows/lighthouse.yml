name: Lighthouse CI

on:
  pull_request:
    paths:
      - 'electricity-prices-build/**'
      - '.github/workflows/lighthouse.yml'
      - 'electricity-prices-build/lighthouserc.json'
  push:
    branches: [main]
    paths:
      - 'electricity-prices-build/**'
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: electricity-prices-build
        run: npm ci

      - name: Build frontend
        working-directory: electricity-prices-build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: electricity-prices-build/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
