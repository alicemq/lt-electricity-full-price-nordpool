name: Tech debt or follow-up
description: Agent-found or deferred work — register for a separate slice (required before picking up)
title: "[type:debt] "
labels:
  - type:debt
  - source:ai
body:
  - type: markdown
    attributes:
      value: |
        Register debt or follow-up work found during another slice. See **AGENTS.md** issue registration.
        Do not implement in the parent PR unless PO explicitly expands scope.
  - type: textarea
    id: user_story
    attributes:
      label: User story
      description: "As a [role], I want [goal], so that [benefit]."
      placeholder: "As a ..., I want ..., so that ..."
    validations:
      required: true
  - type: textarea
    id: dev_story
    attributes:
      label: Dev story
      description: Scope, acceptance criteria, out of scope, suggested owner role.
      placeholder: |
        **Scope:** …
        **Acceptance criteria:**
        - [ ] …
        **Out of scope:**
        - …
        **Suggested owner:** AI Developer | AI QA | AI DevOps | security follow-up
    validations:
      required: true
  - type: input
    id: found_during
    attributes:
      label: Found during
      description: Parent issue or PR where this was discovered (e.g. #42 or PR URL).
      placeholder: "#42"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:p2
        - priority:p1
        - priority:p0
    validations:
      required: true
